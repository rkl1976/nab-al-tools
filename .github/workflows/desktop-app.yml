name: Desktop App - Build & Deploy

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with MAUI app'
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build MAUI App ──
  build-app:
    name: Build MAUI Desktop App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      # ── Portable ZIP (self-contained, no install needed) ──
      - name: Publish portable (self-contained)
        run: |
          dotnet publish web/NabXliffApp/NabXliffApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:WindowsPackageType=None `
            -o ./publish-portable

      - name: Create portable ZIP
        run: Compress-Archive -Path ./publish-portable/* -DestinationPath ./NabXliffApp-win-x64.zip

      # ── MSIX Installer ──
      - name: Create self-signed certificate
        id: cert
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=NAB XLIFF, O=NAB Solutions, C=DK" `
            -KeyUsage DigitalSignature `
            -FriendlyName "NAB XLIFF Dev Certificate" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -NotAfter (Get-Date).AddYears(3)
          echo "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "Certificate created with thumbprint: $($cert.Thumbprint)"

      - name: Generate MSIX icon PNGs
        run: |
          # MSIX needs PNG icons - create simple colored squares as placeholders
          Add-Type -AssemblyName System.Drawing
          foreach ($size in @(44, 150, 310)) {
            $bmp = New-Object System.Drawing.Bitmap $size, $size
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(102, 126, 234))
            $font = New-Object System.Drawing.Font("Segoe UI", [math]::Floor($size * 0.5), [System.Drawing.FontStyle]::Bold)
            $sf = New-Object System.Drawing.StringFormat
            $sf.Alignment = [System.Drawing.StringAlignment]::Center
            $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
            $rect = New-Object System.Drawing.RectangleF(0, 0, $size, $size)
            $g.DrawString("T", $font, [System.Drawing.Brushes]::White, $rect, $sf)
            $g.Dispose()
            $bmp.Save("web/NabXliffApp/Resources/AppIcon/appicon${size}x${size}.png", [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
          }
          # Also create StoreLogo
          Copy-Item "web/NabXliffApp/Resources/AppIcon/appicon44x44.png" "web/NabXliffApp/Resources/AppIcon/storelogo.png"

      - name: Publish MSIX installer
        run: |
          dotnet publish web/NabXliffApp/NabXliffApp.csproj `
            -c Release `
            -f net10.0-windows10.0.19041.0 `
            -r win-x64 `
            -p:WindowsPackageType=MSIX `
            -p:PackageCertificateThumbprint=${{ steps.cert.outputs.thumbprint }} `
            -p:AppxPackageSigningEnabled=true
        continue-on-error: true

      - name: Find and rename MSIX
        id: msix
        run: |
          $msix = Get-ChildItem -Path web/NabXliffApp -Recurse -Filter "*.msix" | Select-Object -First 1
          if ($msix) {
            $dest = "./NabXliffApp-win-x64.msix"
            Copy-Item $msix.FullName $dest
            echo "found=true" >> $env:GITHUB_OUTPUT
            echo "MSIX found: $($msix.FullName)"
          } else {
            # Also check AppPackages folder
            $msix = Get-ChildItem -Path . -Recurse -Filter "*.msix" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($msix) {
              Copy-Item $msix.FullName "./NabXliffApp-win-x64.msix"
              echo "found=true" >> $env:GITHUB_OUTPUT
            } else {
              echo "found=false" >> $env:GITHUB_OUTPUT
              echo "::warning::MSIX file not found. Only ZIP will be published."
            }
          }

      - name: Copy install script
        run: Copy-Item web/landing/install-cert.ps1 ./install-cert.ps1

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: NabXliffApp-portable
          path: ./NabXliffApp-win-x64.zip

      - name: Upload MSIX installer artifact
        if: steps.msix.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NabXliffApp-installer
          path: ./NabXliffApp-win-x64.msix

  # ── Deploy Landing Page to GitHub Pages ──
  deploy-pages:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    needs: build-app
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: NabXliffApp-portable
          path: ./web/landing/downloads/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release ──
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-app
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: NabXliffApp-portable

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: NabXliffApp-installer
        continue-on-error: true

      - name: Copy install script
        run: cp web/landing/install-cert.ps1 ./install-cert.ps1

      - name: Get version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}
          name: NAB XLIFF Desktop App v${{ steps.version.outputs.version }}
          body: |
            ## NAB XLIFF Translator - Desktop App

            Windows desktop application for managing XLIFF translations in Business Central AL projects.

            ### Download Options

            | File | Description |
            |------|-------------|
            | `NabXliffApp-win-x64.zip` | **Portable** — extract and run, no installation needed |
            | `NabXliffApp-win-x64.msix` | **Installer** — Start Menu shortcut, clean uninstall (requires certificate) |
            | `install-cert.ps1` | **Certificate installer** — run first before installing MSIX |

            ### MSIX Installation (2 steps)
            The MSIX uses a self-signed certificate. Install the certificate first:
            1. Download both `install-cert.ps1` and `NabXliffApp-win-x64.msix`
            2. Open **PowerShell as Administrator** and run:
               ```powershell
               .\install-cert.ps1 -MsixPath .\NabXliffApp-win-x64.msix
               ```
            3. Double-click `NabXliffApp-win-x64.msix` to install

            > Or use the **portable ZIP** — just extract and run, no certificate needed.

            ### Prerequisites
            - Windows 10/11
            - [WebView2 Runtime](https://developer.microsoft.com/microsoft-edge/webview2/) (included in Windows 10/11 updates)
            - [Node.js 20+](https://nodejs.org/) (for MCP server)

            ### What's included
            - AI-powered translation chat
            - Batch translation with Azure OpenAI
            - Translation review workflow
            - Glossary management with term extraction
            - Built-in 187 BC terms in 24 languages
            - Real-time logs viewer with diagnostics
          files: |
            NabXliffApp-win-x64.zip
            NabXliffApp-win-x64.msix
            install-cert.ps1
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
